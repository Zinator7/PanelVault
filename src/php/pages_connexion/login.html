<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/auth.css">
</head>
<body>
    <header>
        <a class="logo" href="../../../index.html">Panel<em>Vault</em></a>
        <div class="h-btns">
            <a href="../../../index.html" class="btn btn-ghost">Retour à l'accueil</a>
        </div>
    </header>

    <div class="auth-wrap">
        <div class="auth-bg">
            <div class="auth-bg-panel ab1"></div>
            <div class="auth-bg-panel ab2"></div>
            <div class="auth-bg-panel ab3"></div>
        </div>
        <div class="auth-noise"></div>
        <div class="auth-overlay"></div>
        <div class="auth-card">
            <div class="auth-ghost-num">01</div>
            <div class="auth-eyebrow">Welcome Back</div>
            <h1 class="auth-title">Login</h1>
            <form class="auth-form" action="#" method="POST">
                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button class="btn btn-red btn-full" type="submit">Login</button>
            </form>
            <hr class="auth-divider">
            <div class="auth-link">
                <p>Don't have an account? <a href="register.html">Register</a></p>
            </div>
        </div>
    </div>
    <script src="../../js/auth.js"></script>
</body>
</html>
