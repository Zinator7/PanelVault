<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="../../css/auth.css">
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-bg">
            <div class="auth-bg-panel ab1"></div>
            <div class="auth-bg-panel ab2"></div>
            <div class="auth-bg-panel ab3"></div>
        </div>
        <div class="auth-overlay"></div>
        <div class="auth-card">
            <div class="auth-ghost-num">02</div>
            <div class="auth-eyebrow">Join Us</div>
            <h1 class="auth-title">Register</h1>
            <form class="auth-form" action="#" method="POST">
                <div class="field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required>
                </div>
                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>
                <button class="btn-full" type="submit">Register</button>
            </form>
            <hr class="auth-divider">
            <div class="auth-link">
                <p>Already have an account? <a href="login.html">Login</a></p>
            </div>
        </div>
    </div>
</body>
</html>
